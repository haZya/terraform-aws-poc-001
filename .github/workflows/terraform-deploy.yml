name: Terraform Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: Deployment action.
        type: choice
        options:
          - deploy-staging
          - promote-prod
          - destroy-staging
        default: deploy-staging
      destroy_staging_after_prod:
        description: Destroy staging after a successful prod promotion.
        type: boolean
        default: false
      region:
        description: Optional single-region override. Empty deploys all configured regions.
        type: string

permissions:
  contents: read

env:
  TF_INPUT: false
  TF_IN_AUTOMATION: true

jobs:
  resolve-regions:
    name: Resolve Regions
    runs-on: ubuntu-latest
    outputs:
      regions: ${{ steps.resolve.outputs.regions }}

    steps:
      - name: Resolve target regions
        id: resolve
        env:
          INPUT_REGION: ${{ inputs.region }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_REGIONS_JSON: ${{ vars.AWS_REGIONS_JSON }}
        run: |
          if [ -n "$INPUT_REGION" ]; then
            regions="$(jq -cn --arg region "$INPUT_REGION" '[$region]')"
          elif [ -n "$AWS_REGIONS_JSON" ]; then
            regions="$AWS_REGIONS_JSON"
          elif [ -n "$AWS_REGION" ]; then
            regions="$(jq -cn --arg region "$AWS_REGION" '[$region]')"
          else
            regions='["ap-southeast-2"]'
          fi

          echo "$regions" | jq -e 'type == "array" and length > 0 and all(.[]; type == "string" and length > 0)' > /dev/null
          echo "Resolved regions: $regions"
          echo "regions=$regions" >> "$GITHUB_OUTPUT"

  deploy-staging:
    name: Deploy Staging (${{ matrix.region }})
    runs-on: ubuntu-latest
    needs:
      - resolve-regions
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.action == 'deploy-staging')
    environment: staging
    strategy:
      fail-fast: false
      matrix:
        region: ${{ fromJson(needs.resolve-regions.outputs.regions) }}
    concurrency:
      group: terraform-staging-${{ matrix.region }}
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    env:
      TF_WORKING_DIR: envs/staging
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_KEY: poc-001/staging/${{ matrix.region }}/terraform.tfstate
      TF_STATE_REGION: ${{ vars.TF_STATE_REGION || vars.AWS_REGION || matrix.region }}
      TF_VAR_aws_account_id: ${{ vars.AWS_ACCOUNT_ID }}
      TF_VAR_region: ${{ matrix.region }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check GitHub variables
        run: |
          missing=0

          if [ -z "$AWS_ROLE_ARN" ]; then
            echo "::error::Set AWS_ROLE_ARN on the staging GitHub environment."
            missing=1
          fi

          if [ -z "$TF_STATE_BUCKET" ]; then
            echo "::error::Set TF_STATE_BUCKET as a repository variable or on the staging GitHub environment."
            missing=1
          fi

          if [ -z "$TF_VAR_aws_account_id" ]; then
            echo "::error::Set AWS_ACCOUNT_ID on the staging GitHub environment."
            missing=1
          fi

          exit "$missing"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ matrix.region }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.0

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${TF_STATE_REGION}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -out=tfplan

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan

  deploy-prod:
    name: Promote Prod
    runs-on: ubuntu-latest
    needs:
      - resolve-regions
      - deploy-staging
    if: always() && ((github.event_name == 'push' && needs.deploy-staging.result == 'success') || (github.event_name == 'workflow_dispatch' && inputs.action == 'promote-prod'))
    environment: production
    concurrency:
      group: terraform-prod
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    env:
      TF_WORKING_DIR: envs/prod
      TF_REGIONS_JSON: ${{ needs.resolve-regions.outputs.regions }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_REGION: ${{ vars.TF_STATE_REGION || vars.AWS_REGION || 'ap-southeast-2' }}
      TF_VAR_aws_account_id: ${{ vars.AWS_ACCOUNT_ID }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check GitHub variables
        run: |
          missing=0

          if [ -z "$AWS_ROLE_ARN" ]; then
            echo "::error::Set AWS_ROLE_ARN on the production GitHub environment."
            missing=1
          fi

          if [ -z "$TF_STATE_BUCKET" ]; then
            echo "::error::Set TF_STATE_BUCKET as a repository variable or on the production GitHub environment."
            missing=1
          fi

          if [ -z "$TF_VAR_aws_account_id" ]; then
            echo "::error::Set AWS_ACCOUNT_ID on the production GitHub environment."
            missing=1
          fi

          exit "$missing"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.TF_STATE_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.0

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform deploy regions
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          set -euo pipefail
          mapfile -t regions < <(echo "$TF_REGIONS_JSON" | jq -r '.[]')

          for region in "${regions[@]}"; do
            echo "::group::Deploy prod ${region}"
            export TF_VAR_region="$region"

            terraform init -reconfigure \
              -backend-config="bucket=${TF_STATE_BUCKET}" \
              -backend-config="key=poc-001/prod/${region}/terraform.tfstate" \
              -backend-config="region=${TF_STATE_REGION}" \
              -backend-config="encrypt=true" \
              -backend-config="use_lockfile=true"

            terraform validate
            terraform plan -out=tfplan
            terraform apply -auto-approve tfplan
            echo "::endgroup::"
          done

  destroy-staging:
    name: Destroy Staging (${{ matrix.region }})
    runs-on: ubuntu-latest
    needs:
      - resolve-regions
      - deploy-prod
    if: always() && github.event_name == 'workflow_dispatch' && (inputs.action == 'destroy-staging' || (inputs.action == 'promote-prod' && inputs.destroy_staging_after_prod == true && needs.deploy-prod.result == 'success'))
    environment: staging
    strategy:
      fail-fast: false
      matrix:
        region: ${{ fromJson(needs.resolve-regions.outputs.regions) }}
    concurrency:
      group: terraform-staging-${{ matrix.region }}
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    env:
      TF_WORKING_DIR: envs/staging
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_KEY: poc-001/staging/${{ matrix.region }}/terraform.tfstate
      TF_STATE_REGION: ${{ vars.TF_STATE_REGION || vars.AWS_REGION || matrix.region }}
      TF_VAR_aws_account_id: ${{ vars.AWS_ACCOUNT_ID }}
      TF_VAR_region: ${{ matrix.region }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check GitHub variables
        run: |
          missing=0

          if [ -z "$AWS_ROLE_ARN" ]; then
            echo "::error::Set AWS_ROLE_ARN on the staging GitHub environment."
            missing=1
          fi

          if [ -z "$TF_STATE_BUCKET" ]; then
            echo "::error::Set TF_STATE_BUCKET as a repository variable or on the staging GitHub environment."
            missing=1
          fi

          if [ -z "$TF_VAR_aws_account_id" ]; then
            echo "::error::Set AWS_ACCOUNT_ID on the staging GitHub environment."
            missing=1
          fi

          exit "$missing"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ matrix.region }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.0

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${TF_STATE_REGION}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Terraform destroy
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform destroy -auto-approve
